title: CarBuyingGuide
description: "Your ultimate guide to buying cars, saving on maintenance, and smart auto tips for every driver."
url: "https://kkumakkuma.github.io"
baseurl: "/CarBuyingGuide"
permalink: /:year/:month/:day/:title/
future: true

theme: minima

author:
  name: CarBuyingGuide
  email: ""

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: true

google_analytics: "G-M7B5BZ9TDC"

exclude:
  - scripts/
  - .github/
  - README.md
  - Gemfile
  - Gemfile.lock

# Social / Pinterest
social:
  name: SmartTemplates
  links:
    - https://pinterest.com/smarttemplates
